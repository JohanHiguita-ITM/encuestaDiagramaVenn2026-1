<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Venn Dashboard</title>
  
  <script src="https://cdn.jsdelivr.net/npm/vue@3.3.4/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-venn"></script>
  
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .set-container { border: 1px solid #ccc; padding: 15px; margin-bottom: 10px; border-radius: 4px; background: #f9f9f9; }
    .flex-row { display: flex; gap: 20px; flex-wrap: wrap; }
    .btn { padding: 8px 12px; cursor: pointer; }
    .btn-primary { background: #007bff; color: white; border: none; border-radius: 4px; }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
    .btn-danger { background: #dc3545; color: white; border: none; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="app">
    <h1>Compose Venn Diagram</h1>
    
    <button class="btn btn-primary" @click="addSet" :disabled="querySets.length >= 3" style="margin-bottom: 20px;">
      + Add Set (Max 3)
    </button>

    <div class="flex-row">
      <div v-for="(set, index) in querySets" :key="index" class="set-container">
        <h3>Set {{ String.fromCharCode(65 + index) }}</h3> 
        
        <label>Question ID:</label><br>
        <input type="number" v-model="set.questionId" style="margin-bottom: 10px;" />
        <br>
        
        <label>Answer Value:</label><br>
        <input type="text" v-model="set.answerValue" placeholder="e.g., Yes" style="margin-bottom: 10px;" />
        <br>
        
        <button class="btn btn-danger" @click="removeSet(index)" :disabled="querySets.length <= 1">
          Remove
        </button>
      </div>
    </div>

    <hr style="margin: 20px 0;">

    <button class="btn btn-primary" @click="fetchVennData" style="padding: 10px 20px; font-size: 16px;">
      Generate Diagram
    </button>

    <div style="width: 800px; height: 500px; margin-top: 30px;">
      <canvas id="vennCanvas"></canvas>
    </div>
  </div>

  <script>
    const { createApp } = Vue;

    createApp({
      data() {
        return {
          querySets: [
            { questionId: 1, answerValue: 'Si' },
            { questionId: 2, answerValue: 'Si' }
          ],
          chartInstance: null
        };
      },
      methods: {
        addSet() {
          if (this.querySets.length < 3) {
            this.querySets.push({ questionId: null, answerValue: '' });
          }
        },
        removeSet(index) {
          if (this.querySets.length > 1) {
            this.querySets.splice(index, 1);
          }
        },
        async fetchVennData() {
          try {
            // Send the dynamic array to your Express backend
            const response = await fetch('/dashboard/data', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ sets: this.querySets })
            });
            
            const data = await response.json();
            this.renderChart(data);
          } catch (error) {
            console.error("Error fetching data:", error);
            alert("Failed to fetch data. Ensure your backend is running.");
          }
        },
        renderChart(apiData) {
          const ctx = document.getElementById('vennCanvas').getContext('2d');
          
          if (this.chartInstance) {
            this.chartInstance.destroy();
          }

          // Safe value getter
          const val = (key) => apiData[key] || 0;

          // Dynamically build the chartData array based on how many sets the user defined
          const chartData = [];

          if (this.querySets.length >= 1) {
            chartData.push({ sets: ['A'], value: val('A') });
          }
          if (this.querySets.length >= 2) {
            chartData.push({ sets: ['B'], value: val('B') });
            chartData.push({ sets: ['A', 'B'], value: val('AB') });
          }
          if (this.querySets.length === 3) {
            chartData.push({ sets: ['C'], value: val('C') });
            chartData.push({ sets: ['A', 'C'], value: val('AC') });
            chartData.push({ sets: ['B', 'C'], value: val('BC') });
            chartData.push({ sets: ['A', 'B', 'C'], value: val('ABC') });
          }

          this.chartInstance = new Chart(ctx, {
            type: 'venn',
            data: {
              labels: chartData.map(d => d.sets.join(' ∩ ')),
              datasets: [{
                label: 'Survey Intersections',
                data: chartData,
                backgroundColor: [
                  'rgba(255, 99, 132, 0.6)',  // Red
                  'rgba(54, 162, 235, 0.6)',  // Blue
                  'rgba(255, 206, 86, 0.6)',  // Yellow
                  'rgba(75, 192, 192, 0.6)',  // Green/Teal (Intersections)
                  'rgba(153, 102, 255, 0.6)', // Purple (Intersections)
                  'rgba(255, 159, 64, 0.6)'   // Orange (Intersections)
                ]
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false
            }
          });
        }
      }
    }).mount('#app');
  </script>
</body>
</html>
