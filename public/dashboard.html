<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Venn Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/vue@3.3.4/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-venn"></script>
  <link rel="stylesheet" href="./css/base.css">

  <style>
  /* =========================================
      Dashboard Page Styles
      ========================================= */
    .set-container {
      background: rgba(255, 255, 255, 0.02);
      border: 1px dashed var(--border-color);
      padding: 20px;
      margin-bottom: 15px;
      border-radius: var(--border-radius-element);
      position: relative;
    }

    .result-card {
      background: linear-gradient(145deg, var(--accent-purple) 0%, #8561db 100%);
      color: #ffffff;
      border: none;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .result-value {
      font-size: 48px;
      font-weight: 700;
      margin: 10px 0;
    }

    .chart-container {
      width: 100%;
      height: 400px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>

<body>
  <div id="app">
    <h1>
      Diagrama de Venn Interactivo para Análisis de Encuestas
    </h1>

    <div class="dashboard-grid">

      <div class="dashboard-card" style="grid-column: span 1;">
        <div class="card-header">
          <h3>Seleccione Conjuntos</h3>
          <button class="btn btn-primary" style="padding: 8px 14px; font-size: 12px;" @click="addSet"
            :disabled="querySets.length >= 3">
            Agregar
          </button>
        </div>

        <div v-for="(set, index) in querySets" :key="index" class="set-container">
          <div class="card-header" style="margin-bottom: 10px;">
            <h3 style="margin: 0; color: var(--accent-purple);">Conjunto {{ String.fromCharCode(65 + index) }}</h3>
            <button class="btn btn-danger" @click="removeSet(index)" v-if="querySets.length > 1">Remover</button>
          </div>

          <label>Tipo de Filtro</label>
          <select v-model="set.type">
            <option value="" disabled>Seleccione un tipo de filtro</option>
            <option value="pregunta">Pregunta de Encuesta</option>
            <option value="carrera">Programa Académico</option>
            <option value="genero">Género</option>
            <option value="semestre">Semestre</option>
          </select>

          <div v-if="set.type === 'pregunta'">
            <label>Pregunta</label>
            <select v-model="set.id_pregunta">
              <option v-for="q in preguntasDisponibles" :value="q.id_pregunta">{{ q.texto_pregunta }}</option>
            </select>
            <label>Respuesta</label>
            <select v-model="set.valor">
              <option value="Si">Si</option>
              <option value="No">No</option>
            </select>
          </div>

          <div v-if="set.type === 'carrera'">
            <label>Programa</label>
            <select v-model="set.id_programa">
              <option v-for="c in carrerasDisponibles" :value="c.id_programa">{{ c.nombre }}</option>
            </select>
          </div>

          <div v-if="set.type === 'genero'">
            <label>Selección de Género</label>
            <select id="genero" v-model="set.genero" required>
              <option value="Masculino">Hombre</option>
              <option value="Femenino">Mujer</option>
              <option value="No binario">No binario</option>
              <option value="Prefiero no responder">Prefiero no responder</option>
            </select>
          </div>

          <div v-if="set.type === 'semestre'">
            <label>Número de Semestre</label>
            <input type="number" v-model="set.semestre" min="1" max="10" placeholder="e.g., 5" required>
          </div>
        </div>

        <button class="btn btn-primary btn-block" @click="getDashboardData" style="margin-top: 10px;">
          Generar Diagrama
        </button>
      </div>

      <div style="display: flex; flex-direction: column; gap: 20px; grid-column: span 2;">

        <div v-if="resultadoOperacion !== null" class="dashboard-card result-card">
          <span style="font-size: 14px; opacity: 0.9; text-transform: uppercase; letter-spacing: 1px;">
            Participantes:
          </span>
          <div class="result-value">{{ resultadoOperacion }}</div>
          <span style="font-size: 12px; opacity: 0.8;">Basado en la configuración actual de filtros</span>
        </div>

        <div class="dashboard-card" style="flex-grow: 1;">
          <div class="chart-container">
            <canvas id="vennCanvas"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const { createApp } = Vue;

    createApp({
      data() {
        return {
          carrerasDisponibles: [], // Array to hold careers from DB,
          preguntasDisponibles: [], // Array to hold questions from DB
          querySets: [
            { questionId: '', answerValue: '' }, // Initialize empty to force dropdown selection
            { questionId: '', answerValue: '' }
          ],
          operacion: 'union',
          rawData: null,
          chartInstance: null
        };
      },
      mounted() {
        // Fetch questions as soon as the page loads
        this.cargarPreguntas();
        this.cargarCarreras();
      },
      computed: {
        resultadoOperacion() {
          if (!this.rawData) return null;

          const val = (key) => this.rawData[key] || 0;
          const setsCount = this.querySets.length;

          if (this.operacion === 'interseccion') {
            if (setsCount === 1) return val('A');
            if (setsCount === 2) return val('AB');
            if (setsCount === 3) return val('ABC');
          }

          if (this.operacion === 'union') {
            if (setsCount === 1) return val('A');
            if (setsCount === 2) return val('A') + val('B') - val('AB');
            if (setsCount === 3) return val('A') + val('B') + val('C') - val('AB') - val('AC') - val('BC') + val('ABC');
          }

          if (this.operacion === 'diferencia') {
            if (setsCount === 1) return val('A');
            if (setsCount === 2) return val('A') - val('AB');
            if (setsCount === 3) return val('A') - val('AB') - val('AC') + val('ABC');
          }

          return 0;
        }
      },
      methods: {
        async cargarCarreras() {
          try {
            const response = await fetch('/careers');
            this.carrerasDisponibles = await response.json();
          } catch (error) {
            console.error("Error loading careers:", error);
            alert("No se pudieron cargar las carreras desde la base de datos.");
          }
        },
        async cargarPreguntas() {
          try {
            const response = await fetch('/questions');
            this.preguntasDisponibles = await response.json();
          } catch (error) {
            console.error("Error loading questions:", error);
            alert("No se pudieron cargar las preguntas desde la base de datos.");
          }
        },
        addSet() {
          if (this.querySets.length < 3) this.querySets.push({ questionId: '', answerValue: '' });
        },
        removeSet(index) {
          if (this.querySets.length > 1) {
            this.querySets.splice(index, 1);
            this.rawData = null;
            if (this.chartInstance) this.chartInstance.destroy();
          }
        },
        async getDashboardData() {
          const isValid = this.querySets.every(set => {
            if (set.type === 'pregunta') {
              // Si es pregunta, obligamos a que tenga ID y un valor (Sí/No)
              return set.id_pregunta !== '' && set.valor !== '';
            }
            if (set.type === 'carrera') {
              // Si es carrera, solo necesitamos que haya seleccionado un id_programa
              return set.id_programa !== '';
            }
            if (set.type === 'genero') {
              // Si es género, solo necesitamos que haya seleccionado el género
              return set.genero !== '';
            }
            if (set.type === 'semestre') {
              return set.semestre !== '';
            }
            return false;
          });

          if (!isValid) {
            alert("Por favor, asegúrese de completar todos los campos requeridos según el tipo de filtro elegido.");
            return;
          }
          if (!isValid) {
            alert("Por favor asegúrese de seleccionar una pregunta y una respuesta para todos los conjuntos.");
            return;
          }

          try {
            const response = await fetch('/dashboard/data', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ sets: this.querySets })
            });

            this.rawData = await response.json();
            this.renderChart(this.rawData);
          } catch (error) {
            console.error("Error fetching data:", error);
          }
        },
        renderChart(apiData) {
          const ctx = document.getElementById('vennCanvas').getContext('2d');
          if (this.chartInstance) this.chartInstance.destroy();

          const val = (key) => apiData[key] || 0;
          const chartData = [];

          // 1. PRIMERO agregamos los conjuntos principales para que formen los 3 círculos externos
          if (this.querySets.length >= 1) chartData.push({ sets: ['A'], value: val('A') });
          if (this.querySets.length >= 2) chartData.push({ sets: ['B'], value: val('B') });
          if (this.querySets.length === 3) chartData.push({ sets: ['C'], value: val('C') });

          // 2. DESPUÉS agregamos todas las intersecciones posibles
          if (this.querySets.length >= 2) {
            chartData.push({ sets: ['A', 'B'], value: val('AB') });
          }
          if (this.querySets.length === 3) {
            chartData.push({ sets: ['A', 'C'], value: val('AC') });
            chartData.push({ sets: ['B', 'C'], value: val('BC') });
            chartData.push({ sets: ['A', 'B', 'C'], value: val('ABC') });
          }

          const colorPalette = [
            'rgba(167, 243, 208, 0.9)',   // A: Pastel Green
            'rgba(233, 213, 255, 0.9)',   // B: Pastel Purple
            'rgba(191, 219, 254, 0.9)',   // C: Pastel Blue
            'rgba(200, 228, 231, 0.7)',   // Intersección A ∩ B (Soft teal mix)
            'rgba(179, 231, 231, 0.7)',   // Intersección A ∩ C (Soft cyan mix)
            'rgba(212, 216, 255, 0.7)',   // Intersección B ∩ C (Soft periwinkle mix)
            'rgba(243, 244, 246, 0.8)'    // Intersección A ∩ B ∩ C (Off-white/Light gray)
          ];

          this.chartInstance = new Chart(ctx, {
            type: 'venn',
            data: {
              labels: chartData.map(d => d.sets.join(' ∩ ')),
              datasets: [{
                label: 'Participantes',
                data: chartData,
                backgroundColor: colorPalette,
                borderColor: 'rgba(255, 255, 255, 0.2)',
                borderWidth: 1.5
              }]
            },
            options: {
              // 1. Changes the color of the numbers and set labels (A, B, C)
              color: '#ffffff',

              // 2. Controls the size and style of the numbers inside the chart
              font: {
                size: 32,          // <-- Increase or decrease this value (default is usually 12)
                weight: 'bold',    // <-- Makes the numbers thicker and easier to read
                family: "'Inter', sans-serif" // Matches your dashboard's modern font
              },

              plugins: {
                legend: {
                  labels: {
                    color: '#ffffff',
                    // You can optionally control the legend text size separately here
                    font: {
                      size: 14,
                      weight: 'normal'
                    }
                  }
                }
              }
            }
          });
        }
      }
    }).mount('#app');
  </script>
</body>

</html>
