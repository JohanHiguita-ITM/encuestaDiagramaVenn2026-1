<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Venn Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/vue@3.3.4/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-venn"></script>
  <link rel="stylesheet" href="/css/base.css">

  <style>
    /* =========================================
       Dashboard Page Styles (Mobile First)
       ========================================= */
    .set-container {
      background: rgba(255, 255, 255, 0.02);
      border: 1px dashed var(--border-color);
      padding: 16px;
      margin-bottom: 15px;
      border-radius: var(--border-radius-element);
      position: relative;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .card-header h3 {
      margin: 0;
      font-size: 16px;
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 20px;
    }

    .btn-danger {
      background-color: var(--danger-red);
      color: white;
    }

    /* Labels para los formularios dentro de los conjuntos */
    .set-container label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* Tarjeta de resultados numéricos */
    .result-card {
      background: linear-gradient(145deg, var(--accent-purple) 0%, #8561db 100%);
      color: #ffffff;
      border: none;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 30px 20px;
    }

    .result-value {
      font-size: 42px;
      font-weight: 700;
      margin: 10px 0;
      line-height: 1.1;
    }

    .chart-container {
      width: 100%;
      height: 350px;
      /* Un poco más pequeño en móviles */
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .visualization-panel {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    /* Tablet & Desktop Adjustments */
    @media (min-width: 768px) {
      .visualization-panel {
        grid-column: span 2;
        gap: 20px;
      }

      .chart-container {
        height: 400px;
      }

      .result-value {
        font-size: 48px;
      }

      .card-header h3 {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>
  <div id="app">
    <h1>
      Diagrama de Venn Interactivo para Análisis de Encuestas
    </h1>

    <div class="dashboard-grid">

      <div class="dashboard-card controls-panel">
        <div class="card-header">
          <h3>Seleccione Conjuntos</h3>
          <button class="btn btn-primary btn-sm" @click="addSet" :disabled="querySets.length >= 3">
            Agregar
          </button>
        </div>

        <div v-for="(set, index) in querySets" :key="index" class="set-container">
          <div class="card-header" style="margin-bottom: 10px;">
            <h3 style="color: var(--accent-purple);">Conjunto {{ String.fromCharCode(65 + index) }}</h3>
            <button class="btn btn-danger btn-sm" @click="removeSet(index)" v-if="querySets.length > 1">Remover</button>
          </div>

          <label>Tipo de Filtro</label>
          <select v-model="set.type">
            <option value="" disabled>Seleccione un tipo de filtro</option>
            <option value="pregunta">Pregunta de Encuesta</option>
            <option value="carrera">Programa Académico</option>
            <option value="genero">Género</option>
            <option value="semestre">Semestre</option>
          </select>

          <div v-if="set.type === 'pregunta'">
            <label>Pregunta</label>
            <select v-model="set.id_pregunta">
              <option v-for="q in preguntasDisponibles" :value="q.id_pregunta">{{ q.texto_pregunta }}</option>
            </select>
            <label>Respuesta</label>
            <select v-model="set.valor">
              <option value="Si">Si</option>
              <option value="No">No</option>
            </select>
          </div>

          <div v-if="set.type === 'carrera'">
            <label>Programa</label>
            <select v-model="set.id_programa">
              <option v-for="c in carrerasDisponibles" :value="c.id_programa">{{ c.nombre }}</option>
            </select>
          </div>

          <div v-if="set.type === 'genero'">
            <label>Selección de Género</label>
            <select id="genero" v-model="set.genero" required>
              <option value="Masculino">Hombre</option>
              <option value="Femenino">Mujer</option>
              <option value="No binario">No binario</option>
              <option value="Prefiero no responder">Prefiero no responder</option>
            </select>
          </div>

          <div v-if="set.type === 'semestre'">
            <label>Número de Semestre</label>
            <input type="number" v-model="set.semestre" min="1" max="10" placeholder="e.g., 5" required>
          </div>
        </div>

        <div class="set-container" style="border-color: var(--accent-purple);">
          <label style="color: var(--text-primary); font-weight: 600;">Operación de Conjuntos</label>
          <select v-model="operacion" style="margin-bottom: 0;">
            <option value="union">Unión (A ∪ B)</option>
            <option value="interseccion">Intersección (A ∩ B)</option>
            <option value="diferencia">Diferencia / Excepto (A - B)</option>
          </select>
        </div>

        <button class="btn btn-primary btn-block" @click="getDashboardData" style="margin-top: 10px;">
          Generar Diagrama
        </button>
      </div>

      <div class="visualization-panel">

        <div v-if="resultadoOperacion !== null" class="dashboard-card result-card">
          <span style="font-size: 12px; opacity: 0.9; text-transform: uppercase; letter-spacing: 1px;">
            Participantes Totales
          </span>
          <div class="result-value">{{ resultadoOperacion }}</div>
          <span style="font-size: 13px; opacity: 0.9;">
            Operación: <strong>{{ operacion.toUpperCase() }}</strong>
          </span>
        </div>

        <div class="dashboard-card" style="flex-grow: 1;">
          <div class="chart-container">
            <canvas id="vennCanvas"></canvas>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script>
    const { createApp } = Vue;

    createApp({
      data() {
        return {
          carrerasDisponibles: [],
          preguntasDisponibles: [],
          querySets: [
            { type: '', id_pregunta: '', valor: '', id_programa: '', genero: '', semestre: '' },
            { type: '', id_pregunta: '', valor: '', id_programa: '', genero: '', semestre: '' }
          ],
          operacion: 'union',
          rawData: null,
          chartInstance: null
        };
      },
      mounted() {
        this.cargarPreguntas();
        this.cargarCarreras();
      },
      computed: {
        resultadoOperacion() {
          if (!this.rawData) return null;

          const val = (key) => this.rawData[key] || 0;
          const setsCount = this.querySets.length;

          if (this.operacion === 'interseccion') {
            if (setsCount === 1) return val('A');
            if (setsCount === 2) return val('AB');
            if (setsCount === 3) return val('ABC');
          }

          if (this.operacion === 'union') {
            if (setsCount === 1) return val('A');
            if (setsCount === 2) return val('A') + val('B') - val('AB');
            if (setsCount === 3) return val('A') + val('B') + val('C') - val('AB') - val('AC') - val('BC') + val('ABC');
          }

          if (this.operacion === 'diferencia') {
            if (setsCount === 1) return val('A');
            if (setsCount === 2) return val('A') - val('AB');
            if (setsCount === 3) return val('A') - val('AB') - val('AC') + val('ABC');
          }

          return 0;
        }
      },
      methods: {
        async cargarCarreras() {
          try {
            const response = await fetch('/careers');
            this.carrerasDisponibles = await response.json();
          } catch (error) {
            console.error("Error loading careers:", error);
          }
        },
        async cargarPreguntas() {
          try {
            const response = await fetch('/questions');
            this.preguntasDisponibles = await response.json();
          } catch (error) {
            console.error("Error loading questions:", error);
          }
        },
        addSet() {
          if (this.querySets.length < 3) {
            this.querySets.push({ type: '', id_pregunta: '', valor: '', id_programa: '', genero: '', semestre: '' });
          }
        },
        removeSet(index) {
          if (this.querySets.length > 1) {
            this.querySets.splice(index, 1);
            this.rawData = null;
            if (this.chartInstance) this.chartInstance.destroy();
          }
        },
        async getDashboardData() {
          const isValid = this.querySets.every(set => {
            if (set.type === 'pregunta') return set.id_pregunta !== '' && set.valor !== '';
            if (set.type === 'carrera') return set.id_programa !== '';
            if (set.type === 'genero') return set.genero !== '';
            if (set.type === 'semestre') return set.semestre !== '';
            return false;
          });

          if (!isValid) {
            alert("Por favor, asegúrese de completar todos los campos requeridos según el tipo de filtro elegido.");
            return;
          }

          try {
            const response = await fetch('/dashboard/data', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ sets: this.querySets })
            });

            this.rawData = await response.json();
            this.renderChart(this.rawData);
          } catch (error) {
            console.error("Error fetching data:", error);
          }
        },
        renderChart(apiData) {
          const ctx = document.getElementById('vennCanvas').getContext('2d');
          if (this.chartInstance) this.chartInstance.destroy();

          const val = (key) => apiData[key] || 0;
          const chartData = [];

          if (this.querySets.length >= 1) chartData.push({ sets: ['A'], value: val('A') });
          if (this.querySets.length >= 2) chartData.push({ sets: ['B'], value: val('B') });
          if (this.querySets.length === 3) chartData.push({ sets: ['C'], value: val('C') });

          if (this.querySets.length >= 2) {
            chartData.push({ sets: ['A', 'B'], value: val('AB') });
          }
          if (this.querySets.length === 3) {
            chartData.push({ sets: ['A', 'C'], value: val('AC') });
            chartData.push({ sets: ['B', 'C'], value: val('BC') });
            chartData.push({ sets: ['A', 'B', 'C'], value: val('ABC') });
          }

          const colorPalette = [
            'rgba(167, 243, 208, 0.9)',
            'rgba(233, 213, 255, 0.9)',
            'rgba(191, 219, 254, 0.9)',
            'rgba(200, 228, 231, 0.7)',
            'rgba(179, 231, 231, 0.7)',
            'rgba(212, 216, 255, 0.7)',
            'rgba(243, 244, 246, 0.8)'
          ];

          this.chartInstance = new Chart(ctx, {
            type: 'venn',
            data: {
              labels: chartData.map(d => d.sets.join(' ∩ ')),
              datasets: [{
                label: 'Participantes',
                data: chartData,
                backgroundColor: colorPalette,
                borderColor: 'rgba(255, 255, 255, 0.2)',
                borderWidth: 1.5
              }]
            },
            options: {
              color: '#ffffff',
              font: {
                size: 24, // Reducido un poco para que escale mejor en móvil
                weight: 'bold',
                family: "'Inter', sans-serif"
              },
              plugins: {
                legend: {
                  labels: {
                    color: '#ffffff',
                    font: {
                      size: 14,
                      weight: 'normal'
                    }
                  }
                }
              }
            }
          });
        }
      }
    }).mount('#app');
  </script>
</body>

</html>
