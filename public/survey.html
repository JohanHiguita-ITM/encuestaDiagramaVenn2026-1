<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Survey</title>
  <link rel="stylesheet" href="/css/login.css">
  <script src="https://cdn.jsdelivr.net/npm/vue@3.3.4/dist/vue.global.js"></script>
  <link rel="stylesheet" href="/css/base.css">
  <style>
    /* =========================================
       Survey Specific Styles & Scrollbar
       ========================================= */

    /* Custom Scrollbar for the Card */
    .dashboard-card::-webkit-scrollbar {
      width: 8px;
    }

    .dashboard-card::-webkit-scrollbar-track {
      background: var(--bg-base);
      border-radius: 0 var(--border-radius-card) var(--border-radius-card) 0;
    }

    .dashboard-card::-webkit-scrollbar-thumb {
      background: var(--bg-input);
      border-radius: 10px;
      border: 2px solid var(--bg-card);
    }

    .dashboard-card::-webkit-scrollbar-thumb:hover {
      background: var(--accent-purple);
    }

    /* Progress Bar */
    .progress-container {
      flex-grow: 1;
      height: 6px;
      background-color: var(--bg-input);
      border-radius: 10px;
      margin-left: 20px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background-color: var(--accent-green);
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Tabs Styling */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 25px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 12px;
      overflow-x: auto;
      scrollbar-width: none;
      /* Hide for Firefox */
    }

    .tabs::-webkit-scrollbar {
      display: none;
    }

    .tab-button {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-secondary);
      padding: 8px 16px;
      cursor: pointer;
      font-family: var(--font-main);
      font-size: 13px;
      white-space: nowrap;
      border-radius: var(--border-radius-element);
      transition: all 0.2s;
    }

    .tab-button.active {
      background: var(--bg-input);
      color: var(--accent-purple);
      border-color: var(--border-color);
      font-weight: 600;
    }

    /* Question Cards */
    .question-item {
      background: var(--bg-input);
      padding: 20px;
      border-radius: var(--border-radius-element);
      margin-bottom: 15px;
      border: 1px solid var(--border-color);
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .question-item:focus-within {
      border-color: var(--accent-purple);
      transform: translateX(4px);
    }

    .question-text {
      margin-bottom: 15px;
      font-size: 15px;
      line-height: 1.6;
      color: var(--text-primary);
    }

    /* Radio Buttons */
    .options-group {
      display: flex;
      gap: 24px;
    }

    .radio-label {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      color: var(--text-secondary);
      transition: color 0.2s;
    }

    .radio-label:hover {
      color: var(--text-primary);
    }

    .radio-label input[type="radio"] {
      accent-color: var(--accent-green);
      width: 20px;
      height: 20px;
      cursor: pointer;
    }

    /* Pagination Dots */
    .dots-container {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin: 20px 0;
    }

    .dot-button {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      border: none;
      background: var(--bg-input);
      cursor: pointer;
      padding: 0;
      transition: all 0.3s ease;
    }

    .dot-active {
      background: var(--accent-green);
      width: 20px;
      border-radius: 10px;
    }

    /* Footer & Navigation */
    .survey-footer {
      margin-top: 30px;
      padding-top: 24px;
      border-top: 1px solid var(--border-color);
    }

    .page-navigation {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .btn-secondary {
      background: var(--bg-input);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }

    .btn-secondary:hover:not(:disabled) {
      background: var(--border-color);
    }

    .category-title {
      font-size: 20px;
      color: var(--accent-purple);
      margin-bottom: 20px;
    }

    .loading-state {
      text-align: center;
      padding: 40px;
      color: var(--text-secondary);
    }
  </style>
</head>

<body>
  <div id="app" class="dashboard-grid">
    <div class="dashboard-card"
      style="grid-column: 1 / -1; max-width: 800px; margin: 0 auto; width: 100%; max-height: 85vh; overflow-y: auto;">

      <div class="card-header">
        <h1>Encuesta</h1>
        <div class="progress-container">
          <div class="progress-fill" :style="{ width: progress + '%' }"></div>
        </div>
      </div>

      <div v-if="loading" class="loading-state">
        <p>Cargando encuesta...</p>
      </div>

      <div v-if="error" class="message error">{{ error }}</div>

      <div v-if="!loading && !error">
        <div class="tabs">
          <button v-for="(category, index) in categories" :key="category.id" class="tab-button"
            :class="{ active: index === currentCategoryIndex }" @click="showCategory(index)">
            {{ category.nombre }}
          </button>
        </div>

        <form @submit.prevent="null">
          <div class="category-questions">
            <h2 class="category-title">{{ currentCategory.nombre }}</h2>

            <div v-if="totalPages > 1" class="pagination-header">
              <label>Página {{ currentPageInCategory + 1 }} de {{ totalPages }}</label>
              <div class="dots-container">
                <button v-for="(page, idx) in totalPages" :key="idx" type="button" class="dot-button"
                  :class="{ 'dot-active': currentPageInCategory === idx }" @click="showPage(idx)">
                </button>
              </div>
            </div>

            <div v-for="question in currentPageQuestions" :key="question.id" class="question-item">
              <p class="question-text">{{ question.texto }}</p>
              <div class="options-group">
                <label class="radio-label">
                  <input type="radio" :name="'q' + question.id" value="Sí" v-model="responses[question.id]">
                  <span>Sí</span>
                </label>
                <label class="radio-label">
                  <input type="radio" :name="'q' + question.id" value="No" v-model="responses[question.id]">
                  <span>No</span>
                </label>
              </div>
            </div>
          </div>

          <div class="survey-footer">
            <div class="page-navigation" v-if="totalPages > 1">
              <button type="button" class="btn btn-secondary" @click="prevPage" :disabled="currentPageInCategory === 0">
                Anterior
              </button>
              <button type="button" class="btn btn-secondary" @click="nextPage"
                :disabled="currentPageInCategory >= totalPages - 1">
                Siguiente
              </button>
            </div>

            <div class="action-buttons">
              <button v-if="currentCategoryIndex < categories.length - 1" @click="nextCategory"
                class="btn btn-primary btn-block" :disabled="!isCurrentCategoryComplete">
                Siguiente Categoría
              </button>

              <button v-if="isFormValid" @click="submitResponses" class="btn btn-primary btn-block">
                Enviar Respuestas
              </button>
            </div>
          </div>
        </form>
      </div>

      <p v-if="message" class="message" :class="{ error: message.includes('Error') }">
        {{ message }}
      </p>
    </div>
  </div>

  <script>
    const { createApp } = Vue;

    createApp({
      data() {
        return {
          code: null,
          loading: true,
          error: null,
          message: null,
          categories: [],
          currentCategoryIndex: 0,
          currentPageInCategory: 0,
          questionsPerPage: 5,
          responses: {},
          savedResponses: {},
        };
      },
      computed: {
        currentCategory() {
          return this.categories[this.currentCategoryIndex] || {};
        },
        totalPages() {
          return Math.ceil(this.currentCategory.preguntas?.length / this.questionsPerPage) || 1;
        },
        currentPageQuestions() {
          const startIdx = this.currentPageInCategory * this.questionsPerPage;
          const endIdx = Math.min(startIdx + this.questionsPerPage, this.currentCategory.preguntas?.length || 0);
          return this.currentCategory.preguntas?.slice(startIdx, endIdx) || [];
        },
        progress() {
          return ((this.currentCategoryIndex + 1) / this.categories.length) * 100;
        },
        isCurrentCategoryComplete() {
          return this.currentCategory.preguntas?.every(q => this.responses[q.id]) || false;
        },
        isFormValid() {
          return this.categories.every(category =>
            category.preguntas?.every(q => this.responses[q.id]) || false
          );
        }
      },
      methods: {
        async validateAndLoadSurvey() {
          const query = new URLSearchParams(window.location.search);
          this.code = query.get('code');

          if (!this.code) {
            window.location.href = '/login';
            return;
          }

          try {
            const response = await fetch(`/participant/validate/${encodeURIComponent(this.code)}`);
            if (!response.ok) {
              window.location.href = '/login';
              return;
            }
            const data = await response.json();
            if (!data.valid) {
              window.location.href = '/login';
              return;
            }
            if (data.needsInfo) {
              window.location.href = `/participant/info?code=${encodeURIComponent(this.code)}`;
              return;
            }
            await this.loadSurvey();
          } catch (error) {
            window.location.href = '/login';
          }
        },

        async loadSurvey() {
          try {
            const response = await fetch('/survey/data');
            if (!response.ok) {
              throw new Error('Failed to load survey');
            }
            const data = await response.json();
            this.categories = data.categories;

            // Load existing responses for this participant
            const savedResp = await fetch(`/survey/responses/${encodeURIComponent(this.code)}`)
              .then(res => res.ok ? res.json() : Promise.resolve({ responses: [] }))
              .catch(() => ({ responses: [] }));

            // Create a map of saved responses for easy lookup
            if (savedResp.responses) {
              savedResp.responses.forEach(resp => {
                this.savedResponses[resp.id_pregunta] = resp.valor;
                this.responses[resp.id_pregunta] = resp.valor;
              });
            }

            this.loading = false;
          } catch (error) {
            this.error = error.message;
            this.loading = false;
          }
        },

        showCategory(index) {
          this.currentCategoryIndex = index;
          this.currentPageInCategory = 0;
        },

        showPage(index) {
          this.currentPageInCategory = index;
        },

        prevCategory() {
          if (this.currentCategoryIndex > 0) {
            this.showCategory(this.currentCategoryIndex - 1);
          }
        },

        nextCategory() {
          if (this.currentCategoryIndex < this.categories.length - 1) {
            this.showCategory(this.currentCategoryIndex + 1);
          }
        },

        prevPage() {
          if (this.currentPageInCategory > 0) {
            this.currentPageInCategory--;
          }
        },

        nextPage() {
          if (this.currentPageInCategory < this.totalPages - 1) {
            this.currentPageInCategory++;
          }
        },

        isQuestionAnswered(questionId) {
          return this.responses[questionId] || this.savedResponses[questionId];
        },

        async submitResponses() {
          this.message = 'Enviando...';

          const responses = Object.entries(this.responses).map(([id_pregunta, valor]) => ({
            id_pregunta: parseInt(id_pregunta),
            valor
          }));

          try {
            const response = await fetch('/survey/responses', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ code: this.code, responses })
            });
            if (!response.ok) {
              const result = await response.json();
              throw new Error(result.error || 'Failed to submit responses');
            }
            this.message = 'Respuestas enviadas exitosamente. Gracias por participar.';
          } catch (error) {
            this.message = error.message;
          }
        }
      },
      mounted() {
        this.validateAndLoadSurvey();
      },
    }).mount('#app');
  </script>
</body>

</html>
</body>

</html>
