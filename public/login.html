<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="/css/login.css">
  <script src="https://cdn.jsdelivr.net/npm/vue@3.3.4/dist/vue.global.js"></script>
</head>
<body>
  <div id="app" class="login-container">
    <h1>Login</h1>
    <form @submit.prevent="submitLogin">
      <label for="codigo">Código de participante:</label>
      <input
        type="text"
        id="codigo"
        v-model.trim="codigo"
        required>
      <button type="submit" :disabled="!codigo.trim()">
        Ingresar
      </button>
    </form>
    <p v-if="message" :class="{ error: message.includes('Por favor') }">
      {{ message }}
    </p>
  </div>

  <script>
    const { createApp } = Vue;

    createApp({
      data() {
        return {
          codigo: '',
          message: null
        };
      },
      methods: {
        submitLogin() {
          if (!this.codigo.trim()) {
            this.message = 'Por favor ingresa tu código de participante.';
            return;
          }

          this.message = null;
          fetch('/login', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ codigo: this.codigo.trim() })
          }).then(async (response) => {
            if (response.ok) {
              const {redirect} = await response.json();
 
              if (redirect) {
               window.location.href = redirect;
              } 
            }
          })
        }
      },
      mounted() {
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');
        if (error) {
          this.message = 'Código de participante no encontrado. Por favor intenta nuevamente.';
        }

        const code = urlParams.get('code');
        if (code) {
          this.codigo = code;
        }

        this.submitLogin();
      }
    }).mount('#app');
  </script>
</body>
</html>
