<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complete Your Information</title>
  <script src="https://cdn.jsdelivr.net/npm/vue@3.3.4/dist/vue.global.js"></script>
  <link rel="stylesheet" href="/css/base.css">
  <style>
    /* =========================================
       Personal Info Styles (Mobile First)
       ========================================= */

    /* Centrado de la pantalla, similar al login */
    .login-screen {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100dvh;
      margin: -15px;
      /* Compensa el padding del body en base.css */
      padding: 15px;
      box-sizing: border-box;
    }

    @media (min-width: 768px) {
      .login-screen {
        margin: -30px;
        padding: 30px;
      }
    }

    .login-container {
      width: 100%;
      max-width: 500px;
      /* Más ancho que el login para acomodar nombres de carreras largos */
    }

    h1 {
      margin-top: 0;
      margin-bottom: 5px;
      font-size: 24px;
    }

    /* Layout del formulario */
    .info-form-grid {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-top: 20px;
    }

    .form-item label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    /* Mejora visual para los select en móviles */
    select {
      text-overflow: ellipsis;
      white-space: nowrap;
      overflow: hidden;
    }

    /* Botón de envío con espaciado */
    button[type="submit"] {
      margin-top: 10px;
    }

    /* Estados y Mensajes */
    .loading-state {
      color: var(--text-secondary);
      text-align: center;
      padding: 40px;
      font-style: italic;
    }

    .message {
      padding: 12px;
      border-radius: var(--border-radius-element);
      margin-top: 15px;
      font-size: 14px;
      text-align: center;
    }

    .message.success {
      color: var(--accent-green);
      background: rgba(144, 242, 169, 0.1);
      border: 1px solid rgba(144, 242, 169, 0.2);
    }

    .message.error {
      color: var(--danger-red);
      background: rgba(255, 92, 92, 0.1);
      border: 1px solid rgba(255, 92, 92, 0.2);
      font-weight: 600;
    }
  </style>
</head>

<body>
  <div id="app" class="login-screen">
    <div class="login-container dashboard-card">
      <h1>Información Personal</h1>
      <p style="color: var(--text-secondary); font-size: 14px; margin-bottom: 20px;">
        Por favor, completa tus datos antes de continuar.
      </p>

      <div v-if="loading" class="loading-state">Cargando datos...</div>

      <div v-if="error" class="message error">{{ error }}</div>

      <form v-if="!loading && !error" @submit.prevent="submitInfo" class="info-form-grid">

        <div class="form-item">
          <label for="edad">Edad:</label>
          <input type="number" id="edad" v-model.number="formData.edad" min="1" max="99" placeholder="Ingresa tu edad"
            required>
        </div>

        <div class="form-item">
          <label for="genero">Género:</label>
          <select id="genero" v-model="formData.genero" required>
            <option value="" disabled selected>Selecciona una opción</option>
            <option value="Masculino">Masculino</option>
            <option value="Femenino">Femenino</option>
            <option value="No binario">No binario</option>
            <option value="Prefiero no responder">Prefiero no responder</option>
          </select>
        </div>

        <div class="form-item">
          <label for="programa_academico">Programa Académico:</label>
          <select id="programa_academico" v-model="formData.carrera" required>
            <option value="" disabled selected>Seleccione un programa académico</option>
            <optgroup v-for="grupo in ofertaAcademica" :key="grupo.categoria" :label="grupo.categoria">
              <option v-for="programa in grupo.programas" :key="programa" :value="programa.id_programa">
                {{ programa.nombre }}
              </option>
            </optgroup>
          </select>
        </div>

        <div class="form-item">
          <label for="semestre">Semestre:</label>
          <input type="number" id="semestre" v-model.number="formData.semestre" min="1" max="12" placeholder="Ej: 5"
            required>
        </div>

        <button type="submit" class="btn btn-primary btn-block" :disabled="submitting">
          {{ submitting ? 'Guardando...' : 'Guardar Información' }}
        </button>
      </form>

      <p v-if="message" class="message"
        :class="{ success: message.includes('success') || message.includes('éxito'), error: message.includes('Error') }">
        {{ message }}
      </p>
    </div>
  </div>
  <script>
    const { createApp } = Vue;

    createApp({
      data() {
        return {
          code: null,
          loading: true,
          error: null,
          message: null,
          submitting: false,
          ofertaAcademica: null,
          formData: {
            edad: null,
            genero: '', // Cambiado a string para que el select detecte el disabled correctly
            carrera: '',
            semestre: null
          }
        };
      },
      methods: {
        async getParticipantData() {
          const data = await fetch(`/participant/info/${encodeURIComponent(this.code)}`)
            .then(res => res.json())
            .catch(err => {
              this.error = 'Error al cargar los datos del participante';
              console.error(err);
            });

          if (data && data.participant) {
            this.formData = { ...this.formData, ...data.participant };
          }
        },

        async getOfertaAcademica() {
          try {
            const response = await fetch('/ofertas', {
              method: 'GET',
              headers: { 'Content-Type': 'application/json' },
            });

            if (response.ok) {
              const data = await response.json();
              this.ofertaAcademica = data.ofertas;
            }
          } catch (err) {
            this.error = "No se pudo cargar la oferta académica.";
          }
        },

        async validateAndLoadForm() {
          const query = new URLSearchParams(window.location.search);
          this.code = query.get('code');

          if (!this.code) {
            window.location.href = '/login';
            return;
          }

          try {
            const response = await fetch(`/participant/validate/${encodeURIComponent(this.code)}`);

            if (!response.ok) {
              window.location.href = '/login';
              return;
            }

            const data = await response.json();
            if (!data.valid) {
              window.location.href = '/login';
              return;
            }

            await this.getParticipantData();
            this.loading = false;
          } catch (error) {
            window.location.href = '/login';
          }
        },

        async submitInfo() {
          this.submitting = true;
          this.message = 'Guardando...';

          const payload = {
            code: this.code,
            edad: this.formData.edad,
            genero: Array.isArray(this.formData.genero) ? this.formData.genero.join(', ') : this.formData.genero,
            carrera: this.formData.carrera,
            semestre: this.formData.semestre
          };

          try {
            const response = await fetch('/participant/info', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });

            if (!response.ok) {
              const result = await response.json();
              throw new Error(result.error || 'No se pudo guardar la información');
            }

            window.location.href = `/survey?code=${encodeURIComponent(this.code)}`;
          } catch (error) {
            this.message = error.message;
            this.submitting = false;
          }
        }
      },
      async mounted() {
        await this.getOfertaAcademica();
        await this.validateAndLoadForm();
      }
    }).mount('#app');
  </script>
</body>

</html>
