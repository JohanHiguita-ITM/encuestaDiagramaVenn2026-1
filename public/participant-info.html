<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complete Your Information</title>
  <link rel="stylesheet" href="/css/login.css">
  <script src="https://cdn.jsdelivr.net/npm/vue@3.3.4/dist/vue.global.js"></script>
  <link rel="stylesheet" href="/css/base.css">
</head>

<body>
  <div id="app" class="login-screen">
    <div class="login-container dashboard-card">
      <h1>Información Personal</h1>

      <div v-if="loading" class="loading-state">Loading...</div>

      <div v-if="error" class="message error">{{ error }}</div>

      <form v-if="!loading && !error" @submit.prevent="submitInfo" class="info-form-grid">

        <div class="form-item">
          <label for="edad">Edad:</label>
          <input type="number" id="edad" v-model.number="formData.edad" min="1" max="99" required>
        </div>

        <div class="form-item">
          <label for="genero">Género:</label>
          <select id="genero" v-model="formData.genero" required>
            <option value="Masculino">Masculino</option>
            <option value="Femenino">Femenino</option>
            <option value="No binario">No binario</option>
            <option value="Prefiero no responder">Prefiero no responder</option>
          </select>
        </div>

        <div class="form-item">
          <label for="programa_academico">Programa Académico:</label>
          <select id="programa_academico" v-model="formData.carrera" required>
            <option value="" disabled selected>Seleccione un programa académico</option>
            <optgroup v-for="grupo in ofertaAcademica" :key="grupo.categoria" :label="grupo.categoria">
              <option v-for="programa in grupo.programas" :key="programa" :value="programa.id_programa">
                {{ programa.nombre }}
              </option>
            </optgroup>
          </select>
        </div>

        <div class="form-item">
          <label for="semestre">Semestre:</label>
          <input type="number" id="semestre" v-model.number="formData.semestre" min="1" max="12" required>
        </div>

        <button type="submit" class="btn btn-primary btn-block" :disabled="submitting">
          {{ submitting ? 'Guardando...' : 'Guardar Informacion' }}
        </button>
      </form>

      <p v-if="message" class="message"
        :class="{ success: message.includes('success'), error: message.includes('Error') }">
        {{ message }}
      </p>
    </div>
  </div>
  <script>
    const { createApp } = Vue;

    createApp({
      data() {
        return {
          code: null,
          loading: true,
          error: null,
          message: null,
          submitting: false,
          ofertaAcademica: null,
          formData: {
            edad: null,
            genero: [],
            carrera: '',
            semestre: null
          }
        };
      },
      methods: {
        async getParticipantData() {
          const data = await fetch(`/participant/info/${encodeURIComponent(this.code)}`)
            .then(res => res.json())
            .catch(err => {
              this.error = 'Error fetching participant data';
              console.error(err);
            });

          this.formData = { ...this.formData, ...data.participant };
        },

        async getOfertaAcademica() {
          try {
            const response = await fetch('/ofertas', {
              method: 'GET',
              headers: { 'Content-Type': 'application/json' },
            });

            if (response.ok) {
              const data = await response.json();
              this.ofertaAcademica = data.ofertas
            }
          } catch (err) {
            this.message = error.message;

          }
        },

        async validateAndLoadForm() {
          const query = new URLSearchParams(window.location.search);
          this.code = query.get('code');

          if (!this.code) {
            window.location.href = '/login';
            return;
          }

          try {
            const response = await fetch(`/participant/validate/${encodeURIComponent(this.code)}`);

            if (!response.ok) {
              window.location.href = '/login';
              return;
            }

            const data = await response.json();
            if (!data.valid) {
              window.location.href = '/login';
              return;
            }

            await this.getParticipantData();
            this.loading = false;
          } catch (error) {
            window.location.href = '/login';
          }
        },

        async submitInfo() {
          this.submitting = true;
          this.message = 'Saving...';

          const payload = {
            code: this.code,
            edad: this.formData.edad,
            genero: Array.isArray(this.formData.genero) ? this.formData.genero.join(', ') : this.formData.genero,
            carrera: this.formData.carrera,
            semestre: this.formData.semestre
          };

          try {
            const response = await fetch('/participant/info', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });

            if (!response.ok) {
              const result = await response.json();
              throw new Error(result.error || 'Unable to save information');
            }

            window.location.href = `/survey?code=${encodeURIComponent(this.code)}`;
          } catch (error) {
            this.message = error.message;
            this.submitting = false;
          }
        }
      },
      async mounted() {
        await this.getOfertaAcademica();
        await this.validateAndLoadForm();
      }
    }).mount('#app');
  </script>
</body>

</html>
