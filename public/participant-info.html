<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complete Your Information</title>
  <link rel="stylesheet" href="/css/login.css">
</head>
<body>
  <div class="login-container">
    <h1>Complete Your Information</h1>
    <form id="info-form">
      <input type="hidden" id="code" name="code">
      <label for="edad">Edad:</label>
      <input type="number" id="edad" name="edad" min="1" required>
      <label for="genero">Género:</label>
      <select id="genero" name="genero" multiple required>
        <option value="Masculino">Masculino</option>
        <option value="Femenino">Femenino</option>
        <option value="No binario">No binario</option>
        <option value="Prefiero no responder">Prefiero no responder</option>
      </select>
      <label for="carrera">Carrera:</label>
      <input type="text" id="carrera" name="carrera" required>
      <label for="semestre">Semestre:</label>
      <input type="number" id="semestre" name="semestre" min="1" required>
      <button type="submit">Save information</button>
    </form>
    <p id="message"></p>
  </div>
  <script src="/js/participant-info.js"></script>
</body>
</html>
